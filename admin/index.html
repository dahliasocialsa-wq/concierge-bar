<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concierge Bar — Content Manager</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'dahliasocialsa-wq/concierge-bar',
            branch: 'main',
            base_url: 'https://helpful-naiad-0e21cb.netlify.app',
          },
          media_folder: 'images/uploads',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              folder: 'blog/posts',
              create: true,
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Date', name: 'date', widget: 'datetime' },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
